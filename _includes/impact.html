<aside class="impact-rail" aria-labelledby="impact-rail-heading">
  <div class="impact-rail__inner">
    <p class="eyebrow">Our impact</p>
    <h2 id="impact-rail-heading">How local support changes lives.</h2>
    <div class="impact-rail__cards">
      {% for impact in site.data.impact %}
        <article class="impact-card">
          <img src="{{ impact.image }}" alt="" loading="lazy">
          <strong>{{ impact.statistic }}</strong>
          <p>{{ impact.description }}</p>
        </article>
      {% endfor %}
    </div>
  </div>
</aside>

---
layout: base
---

{% include page-hero.html image=page.pageImage %}

<section class="page-section">
  <div class="content-shell">
    <article class="prose prose--wide">
      {{ content }}
    </article>
  </div>

  {% if page.boxedContent and page.boxedContent.size > 0 %}
    <div class="content-shell">
      {% include boxedContent.html items=page.boxedContent large=page.large %}
    </div>
  {% endif %}
</section>

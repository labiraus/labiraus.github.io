---
layout: base
---

{% include page-hero.html image=page.pageImage variant='banner' %}
<section class="page-section">
  <div class="content-shell{% if page.hasImpact %} content-shell--with-aside{% endif %}">
    <article class="prose">
      {{ content }}
    </article>

    {% if page.boxedContent and page.boxedContent.size > 0 %}
    <div class="content-shell">
      {% include boxedContent.html items=page.boxedContent large=page.large %}
    </div>
    {% endif %}
  </div>
</section>
